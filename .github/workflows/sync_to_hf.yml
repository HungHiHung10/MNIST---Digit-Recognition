name: Sync to Hugging Face Hub
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true
      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git clone https://HungNguyen29:$HF_TOKEN@huggingface.co/spaces/HungNguyen29/digit-recognition hf_space
          rsync -av --exclude='.git' --exclude='hf_space' --exclude='assets/dataset' --exclude='*.h5' ./ hf_space/
          cd hf_space
          git add -A
          git commit -m "Sync from GitHub Action" || echo "No changes to commit"
          git push
