<!DOCTYPE html>
<html>

<head>
    <title>MNIST Digit Recognition</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        .dialog-bg {
            background: rgba(30, 41, 59, 0.45);
        }

        .dialog-animate {
            animation: popIn .25s cubic-bezier(.4, 2, .6, 1.2);
        }

        @keyframes popIn {
            0% {
                transform: scale(0.7);
                opacity: 0;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }
    </style>
</head>

<body>
    <div class="container mx-auto max-w-md mt-10 bg-white rounded-2xl shadow-xl p-8 text-center">
        <h1 class="font-montserrat text-3xl font-bold text-gray-800 mb-5 tracking-wide">Nhận diện chữ số viết tay</h1>
        <div>
            <canvas id="canvas" width="280" height="280"
                class="border-4 border-indigo-400 bg-gray-100 rounded-xl mb-3 shadow-md mx-auto"></canvas>
            <br>
            <button onclick="clearCanvas()"
                class="bg-gray-200 text-indigo-700 font-semibold rounded-lg px-5 py-2 mr-2 hover:bg-gray-300 transition">Xóa
                thông tin</button>
            <button onclick="predict()"
                class="bg-gradient-to-r from-indigo-500 to-blue-400 text-white font-semibold rounded-lg px-5 py-2 ml-2 shadow hover:from-blue-400 hover:to-indigo-500 transition">Dự
                đoán</button>
        </div>
        <div class="mt-6">
            <h3 class="font-montserrat text-lg text-indigo-500 mb-2 mt-0">Hoặc tải ảnh lên:</h3>
            <input type="file" id="imageUpload" accept="image/*"
                class="block mx-auto mb-2 border border-gray-300 rounded px-3 py-2 text-sm"
                onchange="previewImageToCanvas(event)" />
            <button onclick="upload()"
                class="bg-green-400 text-white font-semibold rounded-lg px-5 py-2 shadow hover:bg-green-500 transition">Tải
                ảnh lên</button>

        </div>
        <div id="result"></div>
    </div>
    <div id="customDialogBg" class="fixed inset-0 z-50 flex items-center justify-center hidden dialog-bg">
        <div id="customDialog"
            class="dialog-animate bg-white rounded-2xl shadow-2xl px-8 py-7 max-w-xs w-full text-center">
            <div class="text-5xl font-extrabold text-indigo-500 mb-2" id="dialogDigit"></div>
            <div class="text-lg text-gray-700 mb-5"></div>
            <button onclick="closeDialog()"
                class="mt-2 px-6 py-2 bg-indigo-500 text-white rounded-lg font-semibold shadow hover:bg-indigo-600 transition">Đóng</button>
        </div>
    </div>

    <script>
        function previewImageToCanvas(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function (e) {
                const img = new window.Image();
                img.onload = function () {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    let ratio = Math.min(canvas.width / img.width, canvas.height / img.height);
                    let newWidth = img.width * ratio;
                    let newHeight = img.height * ratio;
                    let x = (canvas.width - newWidth) / 2;
                    let y = (canvas.height - newHeight) / 2;
                    ctx.drawImage(img, x, y, newWidth, newHeight);
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let isDrawing = false;

        canvas.addEventListener('mousedown', () => {
            isDrawing = true;
            ctx.beginPath();
        });

        canvas.addEventListener('mousemove', (e) => {
            if (isDrawing) {
                ctx.lineTo(e.offsetX, e.offsetY);
                ctx.stroke();
            }
        });

        canvas.addEventListener('mouseup', () => isDrawing = false);
        canvas.addEventListener('mouseout', () => isDrawing = false);

        ctx.strokeStyle = 'black';
        ctx.lineWidth = 15;
        ctx.lineCap = 'round';

        function clearCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        function predict() {
            const dataUrl = canvas.toDataURL();
            $.ajax({
                type: 'POST',
                url: '/predict',
                contentType: 'application/json',
                data: JSON.stringify({ image: dataUrl }),
                success: function (response) {
                    showDialog(response.digit);
                    document.getElementById('result').innerHTML = '';
                },
                error: function (error) {
                    alert('Lỗi: ' + error.responseJSON.error);
                }
            });
        }

        function showDialog(digit) {
            document.getElementById('dialogDigit').textContent = digit;
            document.getElementById('customDialogBg').classList.remove('hidden');
        }
        function closeDialog() {
            document.getElementById('customDialogBg').classList.add('hidden');
        }

        function upload() {
            const fileInput = document.getElementById('imageUpload');
            const file = fileInput.files[0];
            if (!file) {
                alert('Vui lòng chọn một file ảnh!');
                return;
            }
            // Hiển thị ảnh lên canvas trước khi upload
            const reader = new FileReader();
            reader.onload = function (e) {
                const img = new window.Image();
                img.onload = function () {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    let ratio = Math.min(canvas.width / img.width, canvas.height / img.height);
                    let newWidth = img.width * ratio;
                    let newHeight = img.height * ratio;
                    let x = (canvas.width - newWidth) / 2;
                    let y = (canvas.height - newHeight) / 2;
                    ctx.drawImage(img, x, y, newWidth, newHeight);
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);

            // Tiếp tục upload như cũ
            const formData = new FormData();
            formData.append('file', file);
            $.ajax({
                type: 'POST',
                url: '/upload',
                data: formData,
                processData: false,
                contentType: false,
                success: function (response) {
                    const resultDiv = document.getElementById('result');
                    resultDiv.innerHTML = `
              <div class="flex flex-col items-center justify-center mt-4">
                <div class="text-green-600 text-lg font-bold mb-2 flex items-center gap-2">
                  <svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 inline-block' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M5 13l4 4L19 7' /></svg>
                  Ảnh đã được tải lên thành công
                </div>
              </div>
            `;
                },
                error: function (error) {
                    alert('Lỗi tải lên: ' + error.responseJSON.error);
                }
            });
        }
    </script>
</body>

</html>
